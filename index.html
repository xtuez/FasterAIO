<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faster By Xtuez</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar-wrapper">
        <nav class="glass-dock" id="top-navbar">
            <div id="nav-indicator"></div>
            <a href="#home" class="nav-btn active">Home</a>
            <a href="#feature" class="nav-btn">Feature</a>
            <a href="#version" class="nav-btn">Version</a>
            <a href="#requirement" class="nav-btn">Requirement</a>
        </nav>
    </header>

    <main>
        <section id="home" class="section">
            <h1 class="main-title">Fast By Xtuez</h1>
            <p class="subtitle">make your edit more faster</p>
        </section>

        <section id="feature" class="section">
            <h2 style="font-size: 36px; margin-bottom: 50px;">Graph Editor Simulation</h2>
            
            <div class="feature-layout">
                <div class="demo-area">
                    <div class="demo-track">
                        <div class="demo-ball" id="demoBall"></div>
                    </div>
                    <div class="demo-label">Live Preview</div>
                </div>

                <div class="graph-ui-wrapper glass-panel">
                    <div class="graph-canvas-box">
                        <svg viewBox="0 0 100 100" id="web-graph-svg">
                            <line x1="0" y1="100" x2="100" y2="0" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-dasharray="5 5"></line>
                            <path id="web-curve-path" d="M 0 100 C 25 90, 25 0, 100 0" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" style="transition: d 0.4s cubic-bezier(0.22, 1, 0.36, 1);"></path>
                        </svg>
                    </div>

                    <div class="graph-pill-nav">
                        <div id="graph-nav-indicator"></div>
                        <div class="g-cat-pill active" data-mode="0" onclick="switchGraphDemo(0, this)">
                            <svg viewBox="0 0 480 480" width="18" height="18" fill="#fff"><path d="M387.28,356.86c-.23,0-.46,0-.69-.01-34.67-1.28-63.25-6.96-84.95-16.9-18.48-8.46-32.58-20.23-41.91-34.97-7.26-11.47-11.02-23.72-14.67-35.57-5.35-17.39-10.4-33.81-26.29-50.15-6.6-6.79-14.25-12.69-22.73-17.55-8.78-5.03-11.82-16.22-6.79-25,5.03-8.78,16.22-11.82,25-6.79,11.44,6.56,21.79,14.56,30.77,23.79,22.05,22.67,29.25,46.1,35.04,64.92,3.21,10.42,5.97,19.42,10.61,26.75,13.44,21.25,46.16,32.97,97.25,34.85,10.11.37,18,8.87,17.63,18.98-.36,9.88-8.49,17.65-18.29,17.65Z"/><circle cx="159.83" cy="159.84" r="22.96"/><circle cx="100.24" cy="148.97" r="25.83"/></svg>
                        </div>
                        <div class="g-cat-pill" data-mode="1" onclick="switchGraphDemo(1, this)">
                            <svg viewBox="0 0 480 480" width="18" height="18" fill="#fff"><path d="M87.25,274.39v-7.49c4.2-21.64,34.92-24.78,41.96-3.41,9.52,28.89-34.7,40.71-41.96,10.89Z"/><path d="M392.75,170.05c0,5.07-1.88,9.71-4.98,13.25-1.39,1.16-2.74,2.34-4.06,3.55-30.85,28.2-43.56,69.63-48.68,110.38-1.52,12.01.86,28.19-15.12,32.04-27.18,6.54-27.09-27.38-32.43-45.15-9.42-31.38-28.13-71.71-66.64-71.15-6.98.1-15.09,3.37-21.7,3.07-21.01-.96-26.87-31.86-3.35-39.33,37.74-11.98,75.79,3.86,99.53,33.7,5.22,6.56,8.92,14.31,14.24,20.56,9.69-28.56,26.24-54.93,48.73-75.08.69-.63,1.4-1.25,2.11-1.85,3.39-2.59,7.62-4.13,12.21-4.13,11.12,0,20.14,9.02,20.14,20.14Z"/><path d="M142.51,197.47c28.13-1.42,30.67,41.9,2.02,43.27-28.04,1.34-30.38-41.84-2.02-43.27Z"/></svg>
                        </div>
                        <div class="g-cat-pill" data-mode="2" onclick="switchGraphDemo(2, this)">
                            <svg viewBox="0 0 480 480" width="18" height="18" fill="#fff"><path d="M223.62,377.32c-.35,0-.7,0-1.03-.02-10.1-.47-17.97-7.13-23.39-19.8-2.87-6.72-5.46-15.88-7.92-28.03-4.27-21.14-7.64-48.5-11.2-77.47-3.34-27.12-6.78-55.16-11.03-77.74-3.05-16.22-5.87-25.95-8.02-31.71-3.3,5.58-8.07,15.33-14.07,32.13-6.71,18.78-13.98,43.57-21.61,73.68-2.29,9.02-11.46,14.49-20.48,12.2-9.02-2.29-14.49-11.46-12.2-20.48,9.26-36.52,17.73-64.56,25.89-85.75,10.21-26.51,23.64-53.36,45.86-51.54,21.46,1.75,29.91,27.72,35.84,55.52,5.39,25.3,9.41,57.98,13.3,89.58,2.98,24.25,5.8,47.15,9.08,65.84.93,5.28,1.81,9.74,2.64,13.49,5.62-16.69,13.81-47.83,24.29-105.73,1.66-9.16,10.43-15.24,19.59-13.59,9.16,1.66,15.25,10.43,13.59,19.59-9.63,53.27-18.38,90.51-26.73,113.85-3.87,10.82-7.72,18.74-11.76,24.21-7.1,9.6-14.96,11.78-20.63,11.78Z"/><circle cx="313.3" cy="225.57" r="19.81" transform="translate(-39.71 69.28) rotate(-11.87)"/><circle cx="365.55" cy="224.17" r="22.29"/></svg>
                        </div>
                    </div>
                    
                    <button class="primary-btn demo-btn" onclick="playBallDemo()">APPLY ANIMATION</button>
                </div>
            </div>
        </section>

        <section id="version" class="section">
            <h2>Version History</h2>
        </section>

        <section id="requirement" class="section">
            <h2>System Requirements</h2>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sections = document.querySelectorAll(".section");
            const navBtns = document.querySelectorAll(".nav-btn");
            const indicator = document.getElementById("nav-indicator");

            // Fungsi memindahkan kotak biru persis ke kordinat tombol
            function moveIndicator(targetBtn) {
                if (!targetBtn) return;
                indicator.style.width = targetBtn.offsetWidth + "px";
                indicator.style.height = targetBtn.offsetHeight + "px";
                indicator.style.left = targetBtn.offsetLeft + "px";
                indicator.style.top = targetBtn.offsetTop + "px";
            }

            // Injeksi posisi pertama kali web dibuka
            const initialActive = document.querySelector(".nav-btn.active") || navBtns[0];
            setTimeout(() => moveIndicator(initialActive), 50);

            // Logika Klik Manual
            navBtns.forEach(btn => {
                btn.addEventListener("click", function(e) {
                    navBtns.forEach(b => b.classList.remove("active"));
                    this.classList.add("active");
                    moveIndicator(this);
                });
            });

            // Logika Sensor Layar (Scroll Spy)
            window.addEventListener("scroll", () => {
                let currentSection = "";
                
                sections.forEach(section => {
                    const sectionTop = section.offsetTop;
                    // Deteksi jika layar sudah melewati batas atas section
                    if (window.scrollY >= (sectionTop - 250)) {
                        currentSection = section.getAttribute("id");
                    }
                });

                navBtns.forEach(btn => {
                    btn.classList.remove("active");
                    if (currentSection && btn.getAttribute("href").includes(currentSection)) {
                        btn.classList.add("active");
                        moveIndicator(btn);
                    }
                });
            });

            // Pengaman agar kotak biru tidak meleset saat layar di-resize
            window.addEventListener("resize", () => {
                const activeBtn = document.querySelector(".nav-btn.active");
                indicator.style.transition = "none"; 
                moveIndicator(activeBtn);
                setTimeout(() => indicator.style.transition = "all 0.4s cubic-bezier(0.22, 1, 0.36, 1)", 50);
            });
        });
        // ==========================================
        // ENGINE: GRAPH EDITOR DEMO
        // ==========================================
        let currentDemoMode = 0; // 0=Bezier, 1=Bounce, 2=Elastic
        
        // Data Path Kurva (Digambar ulang sederhana untuk Web)
        const graphPaths = {
            0: "M 0 100 C 25 90, 25 0, 100 0", // Bezier
            1: "M 0 100 L 25 0 L 45 35 L 65 0 L 85 15 L 100 0", // Bounce (Zigzag Visual)
            2: "M 0 100 C 30 100, 40 -30, 60 20 C 75 50, 85 -10, 100 0" // Elastic (Overshoot)
        };

        window.switchGraphDemo = function(mode, element) {
            currentDemoMode = mode;
            
            // Geser Kotak Indikator (Background Putih)
            const indicator = document.getElementById('graph-nav-indicator');
            indicator.style.left = element.offsetLeft + 'px';
            
            // Ubah Opacity Ikon
            document.querySelectorAll('.g-cat-pill').forEach(pill => pill.classList.remove('active'));
            element.classList.add('active');
            
            // Animasi Ubah Bentuk Kurva SVG
            document.getElementById('web-curve-path').setAttribute('d', graphPaths[mode]);
            
            // Kembalikan bola ke posisi 0 secara instan jika mode diganti
            const ball = document.getElementById('demoBall');
            ball.style.transition = 'none';
            ball.style.animation = 'none';
            ball.style.transform = 'translateX(0)';
        };

        window.playBallDemo = function() {
            const ball = document.getElementById('demoBall');
            
            // Reset bola dulu ke kiri
            ball.style.transition = 'none';
            ball.style.animation = 'none';
            ball.style.transform = 'translateX(0)';
            
            // Paksa browser membaca perubahan sebelum menjalankan animasi
            void ball.offsetWidth; 
            
            // Eksekusi kelas animasi sesuai mode yang aktif
            if (currentDemoMode === 0) {
                ball.classList.add('anim-bezier');
                ball.classList.remove('anim-elastic', 'anim-bounce');
            } else if (currentDemoMode === 1) {
                ball.classList.add('anim-bounce');
                ball.classList.remove('anim-bezier', 'anim-elastic');
            } else if (currentDemoMode === 2) {
                ball.classList.add('anim-elastic');
                ball.classList.remove('anim-bezier', 'anim-bounce');
            }
            
            // Setel ulang bola ke kiri setelah 2 detik
            setTimeout(() => {
                ball.style.transition = 'transform 0.5s ease';
                ball.style.animation = 'none';
                ball.classList.remove('anim-bezier', 'anim-elastic', 'anim-bounce');
                ball.style.transform = 'translateX(0)';
            }, 2000);
        };
    </script>
</body>
</html>
